<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="kexue.fun 是面向 6-12 岁儿童的中文科普知识网站。"
    />
    <title>kexue.fun | 儿童科普知识</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <div id="site-header"></div>

    <main>
      <section class="hero">
        <div class="container hero-grid">
          <div class="hero-copy">
            <p class="kicker">给小小探索家的科学乐园</p>
            <h1>把好奇心，<br />变成<span>新发现</span></h1>
            <p class="hero-text">
              在这里，探索有趣的科学知识，解开世界的奥秘，
              让每一次学习都充满惊喜。
            </p>
            <div class="hero-actions">
              <a class="button primary" href="science.html">开始探索 <b>→</b></a>
              <a class="button secondary" href="about.html">了解更多</a>
            </div>
            <div class="trust-row">
              <span>安全内容</span>
              <span>轻松阅读</span>
              <span>持续更新</span>
            </div>
          </div>

          <div class="hero-art">
            <img src="images/hero-space.png" alt="孩子用望远镜探索宇宙" />
            <div class="knowledge-badge">
              <strong>100+</strong>
              <span>有趣知识</span>
            </div>
          </div>
        </div>
      </section>

      <section class="category-band" aria-label="科普分类">
        <div class="container category-grid">
          <a href="science.html?category=天文宇宙">
            <span><strong>天文宇宙</strong><small>仰望星空</small></span>
          </a>
          <a href="science.html?category=生命科学">
            <span><strong>生命科学</strong><small>认识生命</small></span>
          </a>
          <a href="science.html?category=物质科学">
            <span><strong>物质科学</strong><small>探索物质</small></span>
          </a>
          <a href="science.html?category=地球环境">
            <span><strong>地球环境</strong><small>了解家园</small></span>
          </a>
          <a href="science.html?category=科技发明">
            <span><strong>科技发明</strong><small>发现创造</small></span>
          </a>
          <a href="science.html?category=生活科学">
            <span><strong>生活科学</strong><small>身边奥秘</small></span>
          </a>
        </div>
      </section>

      <section class="section featured">
        <div class="container">
          <div class="section-head">
            <div>
              <span class="section-label">本周精选</span>
              <h2>开启今天的科学发现</h2>
              <p>从一个好问题出发，认识一个更大的世界。</p>
            </div>
            <a class="text-link" href="science.html">查看全部 →</a>
          </div>
          <div id="home-articles" class="card-grid"></div>
        </div>
      </section>

      <section class="question-section">
        <div class="container question-panel">
          <div>
            <span class="section-label light">好奇心加油站</span>
            <h2>世界很大，问题永远问不完</h2>
            <p>每一个“为什么”，都可能是一次了不起的科学探索。</p>
          </div>
          <a class="button white" href="science.html">寻找答案 <b>→</b></a>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
